name: commitlint

on:
  pull_request:
    branches: [main]
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: commitlint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-title:
    name: pr title is conventional
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      # PR title becomes the commit message on squash-merge, so it MUST be conventional.
      - uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017 # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            test
            chore
            refactor
            perf
            build
            ci
            style
            revert
          # Scope is optional and not restricted to an allowlist — release-please
          # uses scope=<branch> (e.g. "chore(main): release 0.1.0") and contributors
          # may legitimately introduce new scopes. CLAUDE.md lists suggested scopes.
          requireScope: false
          subjectPattern: ^[A-Za-z0-9].+$
          subjectPatternError: |
            The PR title subject must start with an alphanumeric character.

  commits:
    name: commits are conventional
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1
        with:
          configFile: .commitlintrc.json
          firstParent: false
          failOnWarnings: false
          helpURL: https://www.conventionalcommits.org
