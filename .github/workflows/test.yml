name: test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-script:
    name: lint script unittest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: run unittest
        working-directory: skills/lint/scripts
        run: python3 -m unittest test_lint.py -v

      - name: lint clean fixture
        run: python3 skills/lint/scripts/lint.py skills/lint/scripts/fixtures/clean
