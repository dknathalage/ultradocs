name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release:
    name: release-please
    runs-on: ubuntu-latest
    steps:
      # On every push to main, release-please:
      #   * opens / updates a "release PR" that bumps version + writes CHANGELOG
      #     based on conventional commits since the last tag (feat -> minor,
      #     fix -> patch, BREAKING CHANGE / feat! -> major; pre-1.0 caps majors
      #     to minor bumps via bump-minor-pre-major).
      #   * when that release PR is merged, creates a Git tag (vX.Y.Z) and a
      #     GitHub Release.
      - uses: googleapis/release-please-action@a02a34c4d625f9be7cb89156071d8567266a2445 # v4.1.3
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}
