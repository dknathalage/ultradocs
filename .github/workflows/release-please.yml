name: release-please

on:
  push:
    branches: [main]

# The default GITHUB_TOKEN is unused; we mint a short-lived App token below.
# Keep default-token permissions read-only as a belt-and-braces measure.
permissions:
  contents: read

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release:
    name: release-please
    runs-on: ubuntu-latest
    steps:
      # Mint a short-lived (~1h) installation token from the
      # dknathalage-release-bot GitHub App. We use the App token instead
      # of GITHUB_TOKEN because PRs / commits made with GITHUB_TOKEN do
      # not trigger other workflows. The App token is a separate
      # identity, so the release PR DOES get CI runs.
      - name: mint app token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.11.0
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      # release-please opens / updates a release PR that bumps version +
      # writes CHANGELOG based on conventional commits since the last tag
      # (feat -> minor, fix -> patch, BREAKING CHANGE / feat! -> major;
      # pre-1.0 caps majors to minor via bump-minor-pre-major).
      # The maintainer reviews and merges the release PR by hand. When
      # the PR merges, this workflow runs again (the merge is a push to
      # main) and release-please creates the tag + GitHub Release.
      - name: run release-please
        uses: googleapis/release-please-action@a02a34c4d625f9be7cb89156071d8567266a2445 # v4.1.3
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ steps.app-token.outputs.token }}
