name: release-please-automerge

# Side workflow that merges release-please PRs once their required checks
# go green. We can't rely on GitHub's built-in auto-merge engine because
# the release PR is opened by the dknathalage-release-bot App: GitHub
# refuses to auto-merge a PR whose author is the only bypass actor (and
# who therefore has no separate approving review).
#
# Trigger: every check_suite that completes on the repo. Fires for all
# branches; we filter aggressively to release-please PRs authored by the
# bot before doing anything privileged.
#
# Workflow file is read from the default branch for this event type, so
# contributor PRs cannot modify this behaviour.

on:
  check_suite:
    types: [completed]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: release-please-automerge-${{ github.event.check_suite.head_sha }}
  cancel-in-progress: false

jobs:
  merge:
    name: try-merge release PR
    runs-on: ubuntu-latest
    if: github.event.check_suite.conclusion == 'success'
    steps:
      - name: mint app token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.11.0
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: merge release-please PR if any
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.check_suite.head_sha }}
          BOT_LOGIN: dknathalage-release-bot[bot]
        run: |
          set -euo pipefail

          # Two-layer filter: PR author must be the release bot AND
          # the head branch must start with "release-please--". Either
          # alone is insufficient because branch names are not protected
          # — only the App can create PRs as the bot, so the user check
          # is the load-bearing one. Branch prefix is belt-and-braces.
          PRS=$(gh api "/repos/$REPO/commits/$HEAD_SHA/pulls" \
            --jq '.[] | select(.user.login==env.BOT_LOGIN and (.head.ref|startswith("release-please--"))) | .number')

          if [ -z "$PRS" ]; then
            echo "No release-please PR at $HEAD_SHA — nothing to do."
            exit 0
          fi

          for PR in $PRS; do
            echo "Attempting merge of PR #$PR"
            # Squash merge via raw API. The App is a bypass actor on
            # main's PR-review ruleset, so the merge succeeds without
            # an approving review. Required status checks are NOT
            # bypassed; if any check is still pending or failing the
            # API returns 405 and we move on. The next check_suite
            # event will retry until everything is green.
            if gh api -X PUT "/repos/$REPO/pulls/$PR/merge" -f merge_method=squash; then
              echo "Merged PR #$PR"
            else
              echo "PR #$PR not yet mergeable (other checks pending or failed). Will retry on next check_suite."
            fi
          done
